        sudoers:
          type: file
          content: "# This file MUST be edited with the 'visudo' command as root.\n\
            Defaults\tenv_reset\nDefaults\tmail_badpass\nDefaults\tsecure_path=\"\
            /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin\"\
            \nDefaults\tlogfile=/var/log/sudo.log\nDefaults\tlog_input,log_output\n\
            \nroot\tALL=(ALL:ALL) ALL\n%admin\tALL=(ALL) ALL\n%sudo\tALL=(ALL:ALL)\
            \ ALL\n\n# Infrastructure team\ndevops\tALL=(ALL) NOPASSWD: /usr/bin/docker,\
            \ /usr/local/bin/kubectl, /bin/systemctl\nsysadmin ALL=(ALL) NOPASSWD:\
            \ ALL\nansible ALL=(ALL) NOPASSWD: ALL\nterraform ALL=(root) NOPASSWD:\
            \ /usr/local/bin/terraform\njenkins ALL=(ALL) NOPASSWD: /usr/bin/docker,\
            \ /usr/local/bin/kubectl\ndeploy  ALL=(ALL) NOPASSWD: /usr/bin/docker,\
            \ /bin/systemctl restart *, /usr/bin/rsync\nnetadmin ALL=(root) NOPASSWD:\
            \ /sbin/iptables, /sbin/ip, /usr/sbin/tcpdump\nk8sadmin ALL=(ALL) NOPASSWD:\
            \ /usr/local/bin/kubectl, /usr/local/bin/helm\ndbadmin ALL=(postgres)\
            \ NOPASSWD: /usr/bin/psql, ALL\n"
