        fstab:
          type: file
          content: 'UUID=a6c6-b4f2 /               ext4 errors=remount-ro 0 1

            UUID=b71a-9e43 /boot/efi       vfat umask=0077 0 1

            UUID=d8f2-3310 /data           ext4 defaults 0 2

            /dev/mapper/swap none swap sw 0 0

            10.0.5.10:/exports/shared /mnt/nfs nfs defaults 0 0'
        crontab:
          type: file
          content: "# /etc/crontab: system-wide crontab\nSHELL=/bin/sh\nPATH=/usr/local/sbin:/usr/local/bin:/sbin:/bin:/usr/sbin:/usr/bin\n\
            \n# m h dom mon dow user\tcommand\n17 *\t* * *\troot    cd / && run-parts\
            \ --report /etc/cron.hourly\n25 6\t* * *\troot\ttest -x /usr/sbin/anacron\
            \ || ( cd / && run-parts --report /etc/cron.daily )\n47 6\t* * 7\troot\t\
            test -x /usr/sbin/anacron || ( cd / && run-parts --report /etc/cron.weekly\
            \ )\n52 6\t1 * *\troot\ttest -x /usr/sbin/anacron || ( cd / && run-parts\
            \ --report /etc/cron.monthly )\n\n# Database backups\n0 2 * * *  dbadmin\
            \  /opt/scripts/db_backup.sh >> /var/log/db_backup.log 2>&1\n30 2 * *\
            \ * backup   /opt/scripts/s3_sync.sh >> /var/log/s3_sync.log 2>&1\n\n\
            # Health checks\n*/5 * * * * monitor /opt/scripts/health_check.sh > /dev/null\
            \ 2>&1\n\n# Certificate renewal\n0 3 * * 1  root     certbot renew --quiet\
            \ >> /var/log/certbot.log 2>&1\n\n# Log rotation\n0 0 * * *  root    \
            \ /usr/sbin/logrotate /etc/logrotate.conf\n\n# Prometheus node exporter\
            \ metrics flush\n*/1 * * * * prometheus /opt/prometheus/flush_metrics.sh\
            \ > /dev/null 2>&1\n\n# Security audit\n0 4 * * *  secops   /opt/scripts/audit_scan.sh\
            \ >> /var/log/security_audit.log 2>&1\n"
        iptables:
          type: dir
          children:
            rules.v4:
              type: file
              content: '# Generated by iptables-save

                *filter

                :INPUT DROP [0:0]

                :FORWARD DROP [0:0]

                :OUTPUT ACCEPT [0:0]


                # Allow established connections

                -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT


                # Allow loopback

                -A INPUT -i lo -j ACCEPT


                # Allow SSH

                -A INPUT -p tcp --dport 22 -m state --state NEW -m recent --set

                -A INPUT -p tcp --dport 22 -m state --state NEW -m recent --update
                --seconds 60 --hitcount 5 -j DROP

                -A INPUT -p tcp --dport 22 -j ACCEPT


                # Allow HTTP/HTTPS

                -A INPUT -p tcp --dport 80 -j ACCEPT

                -A INPUT -p tcp --dport 443 -j ACCEPT


                # Allow internal k8s cluster

                -A INPUT -s 10.0.1.0/24 -j ACCEPT


                # Allow monitoring

                -A INPUT -p tcp --dport 9090 -s 10.0.3.16 -j ACCEPT

                -A INPUT -p tcp --dport 9100 -s 10.0.3.16 -j ACCEPT


                # Allow internal comms

                -A INPUT -s 10.0.0.0/8 -j ACCEPT


                # Drop everything else

                -A INPUT -j LOG --log-prefix "IPTABLES-DROP: " --log-level 7

                -A INPUT -j DROP


                COMMIT

                '
        ssh:
          type: dir
          children:
            sshd_config:
              type: file
              content: '# SSH Server Configuration - CORP-INFRA-SVR04

                Port 22

                AddressFamily inet

                ListenAddress 0.0.0.0


                HostKey /etc/ssh/ssh_host_rsa_key

                HostKey /etc/ssh/ssh_host_ecdsa_key

                HostKey /etc/ssh/ssh_host_ed25519_key


                SyslogFacility AUTH

                LogLevel INFO


                LoginGraceTime 2m

                PermitRootLogin prohibit-password

                StrictModes yes

                MaxAuthTries 6

                MaxSessions 10


                PubkeyAuthentication yes

                AuthorizedKeysFile .ssh/authorized_keys


                PasswordAuthentication yes

                PermitEmptyPasswords no

                ChallengeResponseAuthentication no


                UsePAM yes

                X11Forwarding no

                PrintMotd no


                ClientAliveInterval 300

                ClientAliveCountMax 2


                AllowGroups sudo devteam infra security


                Banner /etc/ssh/banner.txt

                '
            banner.txt:
              type: file
              content: '

                *** AUTHORIZED ACCESS ONLY ***

                This system is property of CORP. All activity is monitored and logged.

                Unauthorized access is prohibited and will be prosecuted to the full
                extent of the law.

                '
            ssh_host_rsa_key.pub:
              type: file
              content: ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC... root@svr04
            ssh_host_ed25519_key.pub:
              type: file
              content: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH... root@svr04
        nginx:
          type: dir
          children:
            nginx.conf:
              type: file
              content: "user nginx;\nworker_processes auto;\nerror_log /var/log/nginx/error.log\
                \ warn;\npid /var/run/nginx.pid;\n\nevents {\n    worker_connections\
                \ 4096;\n    use epoll;\n    multi_accept on;\n}\n\nhttp {\n    include\
                \       /etc/nginx/mime.types;\n    default_type  application/octet-stream;\n\
                \n    log_format main '$remote_addr - $remote_user [$time_local] \"\
                $request\" '\n                    '$status $body_bytes_sent \"$http_referer\"\
                \ '\n                    '\"$http_user_agent\" \"$http_x_forwarded_for\"\
                ';\n\n    access_log  /var/log/nginx/access.log  main;\n\n    sendfile\
                \        on;\n    tcp_nopush      on;\n    tcp_nodelay     on;\n \
                \   keepalive_timeout 65;\n    gzip  on;\n    gzip_types text/plain\
                \ application/json application/javascript text/css;\n\n    include\
                \ /etc/nginx/conf.d/*.conf;\n    include /etc/nginx/sites-enabled/*;\n\
                }\n"
            mime.types:
              type: file
              content: types { text/html html htm shtml; text/css css; text/xml xml;
                application/json json; application/javascript js; }
            conf.d:
              type: dir
              children:
                default.conf:
                  type: file
                  content: server { listen 80; server_name _; return 301 https://$host$request_uri;
                    }
                api.conf:
                  type: file
                  content: 'upstream api_backend { server 10.0.1.20:8080; server 10.0.1.21:8080;
                    server 10.0.1.22:8080; }

                    server { listen 443 ssl; server_name api.corp.internal; ssl_certificate
                    /etc/letsencrypt/live/api.corp.internal/fullchain.pem; ssl_certificate_key
                    /etc/letsencrypt/live/api.corp.internal/privkey.pem; location
                    / { proxy_pass http://api_backend; proxy_set_header Host $host;
                    } }'
                grafana.conf:
                  type: file
                  content: server { listen 443 ssl; server_name grafana.corp.internal;
                    location / { proxy_pass http://localhost:3000; } }
            sites-enabled:
              type: dir
              children:
