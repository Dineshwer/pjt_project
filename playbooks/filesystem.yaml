        scripts:
          type: dir
          children:
            db_backup.sh:
              type: file
              content: '#!/bin/bash

                set -e

                DATE=$(date +%Y%m%d_%H%M%S)

                DB_PASS=''SssPK2T6fABmV5wSIt''

                mysqldump -h db-primary -u root -p"$DB_PASS" --all-databases | gzip
                > /var/backups/db_$DATE.sql.gz

                aws s3 cp /var/backups/db_$DATE.sql.gz s3://corp-backups/db/$DATE/

                echo ''[OK] Backup uploaded: ''$DATE

                '
            s3_sync.sh:
              type: file
              content: '#!/bin/bash

                aws s3 sync /var/backups/ s3://corp-backups/manual/ --storage-class
                STANDARD_IA

                echo ''[OK] S3 sync complete''

                '
            health_check.sh:
              type: file
              content: "#!/bin/bash\nfor svc in api-gateway auth-service user-service\
                \ order-service; do\n  STATUS=$(curl -s -o /dev/null -w '%{http_code}'\
                \ http://localhost:8080/health)\n  [ \"$STATUS\" != \"200\" ] && echo\
                \ \"[ALERT] $svc unhealthy\" | mail -s \"Health Alert\" ops@corp.internal\n\
                done\n"
            deploy.sh:
              type: file
              content: '#!/bin/bash

                # Rolling deploy

                SERVICE=$1

                TAG=$2

                kubectl set image deployment/$SERVICE $SERVICE=registry.corp.internal/$SERVICE:$TAG
                -n production

                kubectl rollout status deployment/$SERVICE -n production --timeout=300s

                echo "[OK] Deployed $SERVICE:$TAG"

                '
            audit_scan.sh:
              type: file
              content: '#!/bin/bash

                # Daily security scan

                lynis audit system --quiet >> /var/log/security_audit.log

                rkhunter --check --sk >> /var/log/security_audit.log

                find / -perm -4000 -type f 2>/dev/null >> /var/log/security_audit.log

                echo ''[OK] Audit complete''

                '
            rotate_secrets.sh:
              type: file
              content: '#!/bin/bash

                # Secret rotation script

                NEW_DB_PASS=$(openssl rand -base64 24)

                NEW_REDIS_PASS=$(openssl rand -base64 24)

                vault kv put secret/db/prod password=$NEW_DB_PASS

                vault kv put secret/redis/prod password=$NEW_REDIS_PASS

                mysql -h db-primary -u root -p"rIqvgs7M2q6O7FVVU5" -e "ALTER USER
                ''appuser''@''%'' IDENTIFIED BY ''$NEW_DB_PASS'';"

                kubectl create secret generic db-credentials --from-literal=password=$NEW_DB_PASS
                --dry-run=client -o yaml | kubectl apply -f -

                echo ''[OK] Secrets rotated''

                '
