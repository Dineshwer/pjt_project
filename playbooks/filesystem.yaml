                        \n@app.route('/api/v1/status')\ndef status(): return jsonify(service='api-gateway',\
                        \ version='1.0.0', env=os.getenv('APP_ENV'))\n\nif __name__\
                        \ == '__main__':\n    app.run(host='0.0.0.0', port=int(os.getenv('PORT',\
